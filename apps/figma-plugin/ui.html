<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Figma2Element</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 16px;
        background: #111827;
        color: #f9fafb;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      input,
      button,
      textarea {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(17, 24, 39, 0.88);
        color: inherit;
        padding: 10px 12px;
        font: inherit;
        box-sizing: border-box;
      }

      button {
        cursor: pointer;
        background: #0f766e;
      }

      button.secondary {
        background: transparent;
      }

      textarea {
        min-height: 170px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .meta {
        font-size: 12px;
        color: #cbd5e1;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <strong>Figma2Element</strong>
      <div class="meta">Serialize the current selection, send it to the local converter, and download Elementor JSON.</div>

      <label class="stack">
        <span class="meta">API endpoint</span>
        <input id="endpoint" value="http://127.0.0.1:4173/api/convert" />
      </label>

      <label class="stack">
        <span class="meta">API key</span>
        <input id="api-key" value="f2e_live_local_plugin_key" />
      </label>

      <div class="row">
        <button id="refresh" class="secondary" type="button">Refresh selection</button>
        <button id="convert" type="button">Convert</button>
      </div>

      <label class="stack">
        <span class="meta">Selection payload</span>
        <textarea id="selection" readonly></textarea>
      </label>

      <label class="stack">
        <span class="meta">Elementor output</span>
        <textarea id="output" readonly></textarea>
      </label>

      <button id="download" class="secondary" type="button" disabled>Download JSON</button>
      <div id="status" class="meta">Waiting for selection.</div>
    </div>

    <script>
      const endpointEl = document.querySelector("#endpoint");
      const apiKeyEl = document.querySelector("#api-key");
      const selectionEl = document.querySelector("#selection");
      const outputEl = document.querySelector("#output");
      const downloadEl = document.querySelector("#download");
      const statusEl = document.querySelector("#status");
      let latestTemplate = null;

      endpointEl.value = localStorage.getItem("f2e:endpoint") || endpointEl.value;
      apiKeyEl.value = localStorage.getItem("f2e:api-key") || apiKeyEl.value;

      endpointEl.oninput = () => {
        localStorage.setItem("f2e:endpoint", endpointEl.value.trim());
      };

      apiKeyEl.oninput = () => {
        localStorage.setItem("f2e:api-key", apiKeyEl.value.trim());
      };

      document.querySelector("#refresh").onclick = () => {
        parent.postMessage({ pluginMessage: { type: "refresh-selection" } }, "*");
      };

      document.querySelector("#convert").onclick = () => {
        statusEl.textContent = "Converting selection...";
        parent.postMessage(
          {
            pluginMessage: {
              type: "convert-selection",
              endpoint: endpointEl.value.trim(),
              apiKey: apiKeyEl.value.trim()
            }
          },
          "*"
        );
      };

      downloadEl.onclick = () => {
        if (!latestTemplate) {
          return;
        }

        const blob = new Blob([JSON.stringify(latestTemplate, null, 2)], {
          type: "application/json"
        });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");

        anchor.href = url;
        anchor.download = "elementor-template.json";
        anchor.click();
        URL.revokeObjectURL(url);
      };

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;

        if (!message) {
          return;
        }

        if (message.type === "selection-data") {
          selectionEl.value = JSON.stringify(message.payload, null, 2);
          statusEl.textContent = "Selection ready.";
          return;
        }

        if (message.type === "conversion-result") {
          if (message.payload && message.payload.template) {
            latestTemplate = message.payload.template;
            outputEl.value = JSON.stringify(message.payload.template, null, 2);
            downloadEl.disabled = false;
            statusEl.textContent = message.payload.report
              ? `Converted ${message.payload.report.convertedNodes} nodes. Job ${message.payload.job ? message.payload.job.id : "saved"}.`
              : "Conversion complete.";
          } else {
            outputEl.value = JSON.stringify(message.payload, null, 2);
            statusEl.textContent = message.payload.error || "Conversion failed.";
          }
        }
      };
    </script>
  </body>
</html>
