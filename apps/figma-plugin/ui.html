<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Figma2Element</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 16px;
        background: #111827;
        color: #f9fafb;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .stack-tight {
        display: grid;
        gap: 8px;
      }

      input,
      button,
      textarea {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(17, 24, 39, 0.88);
        color: inherit;
        padding: 10px 12px;
        font: inherit;
        box-sizing: border-box;
      }

      button {
        cursor: pointer;
        background: #0f766e;
      }

      button.secondary {
        background: transparent;
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      textarea {
        min-height: 170px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .meta {
        font-size: 12px;
        color: #cbd5e1;
        line-height: 1.5;
      }

      .status {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
      }

      .status.loading {
        border-color: rgba(15, 118, 110, 0.55);
        color: #99f6e4;
      }

      .status.success {
        border-color: rgba(34, 197, 94, 0.45);
        color: #bbf7d0;
      }

      .status.error {
        border-color: rgba(248, 113, 113, 0.45);
        color: #fecaca;
      }

      .detail {
        font-size: 12px;
        color: #e5e7eb;
        line-height: 1.5;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <strong>Figma2Element</strong>
      <div class="meta">Serialize the current selection, send it to the local converter, and download Elementor JSON.</div>

      <label class="stack">
        <span class="meta">API endpoint</span>
        <input id="endpoint" value="https://figma2elementor.ctrlaltl.com/api/convert" />
      </label>

      <label class="stack">
        <span class="meta">API key</span>
        <input id="api-key" value="f2e_live_local_plugin_key" />
      </label>

      <div class="row">
        <button id="refresh" class="secondary" type="button">Refresh selection</button>
        <button id="convert" type="button">Convert</button>
      </div>

      <label class="stack">
        <span class="meta">Selection payload</span>
        <textarea id="selection" readonly></textarea>
      </label>

      <label class="stack">
        <span class="meta">Elementor output</span>
        <textarea id="output" readonly></textarea>
      </label>

      <button id="download" class="secondary" type="button" disabled>Download JSON</button>
      <div id="status" class="meta status">Waiting for selection.</div>
      <div id="detail" class="detail">No request has been sent yet.</div>
    </div>

    <script>
      const endpointEl = document.querySelector("#endpoint");
      const apiKeyEl = document.querySelector("#api-key");
      const selectionEl = document.querySelector("#selection");
      const outputEl = document.querySelector("#output");
      const downloadEl = document.querySelector("#download");
      const statusEl = document.querySelector("#status");
      const detailEl = document.querySelector("#detail");
      const convertButton = document.querySelector("#convert");
      let latestTemplate = null;
      let latestDownloadName = "elementor-template.json";
      let isLoading = false;

      function setStatus(kind, message, detail = "") {
        statusEl.className = `meta status${kind ? ` ${kind}` : ""}`;
        statusEl.textContent = message;
        detailEl.textContent = detail || "No additional details.";
      }

      function setLoading(nextValue) {
        isLoading = nextValue;
        convertButton.disabled = nextValue;
        convertButton.textContent = nextValue ? "Converting..." : "Convert";
      }

      function slugify(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "");
      }

      function buildExportFilename(title, uniqueSuffix) {
        const base = slugify(title) || "elementor-template";

        if (uniqueSuffix) {
          return `${base}-${uniqueSuffix}.json`;
        }

        const stamp = new Date().toISOString().replace(/[-:]/g, "").replace(/\.\d+Z$/, "z");
        return `${base}-${stamp}.json`;
      }

      function currentSelection() {
        try {
          return selectionEl.value.trim() ? JSON.parse(selectionEl.value) : null;
        } catch (error) {
          return null;
        }
      }

      function readStoredValue(key, fallbackValue) {
        try {
          const stored = window.localStorage.getItem(key);
          return stored || fallbackValue;
        } catch (error) {
          return fallbackValue;
        }
      }

      function writeStoredValue(key, value) {
        try {
          window.localStorage.setItem(key, value);
        } catch (error) {
          // Figma may disable storage inside the plugin iframe.
        }
      }

      endpointEl.value = readStoredValue("f2e:endpoint", endpointEl.value);
      apiKeyEl.value = readStoredValue("f2e:api-key", apiKeyEl.value);

      endpointEl.oninput = () => {
        writeStoredValue("f2e:endpoint", endpointEl.value.trim());
      };

      apiKeyEl.oninput = () => {
        writeStoredValue("f2e:api-key", apiKeyEl.value.trim());
      };

      document.querySelector("#refresh").onclick = () => {
        parent.postMessage({ pluginMessage: { type: "refresh-selection" } }, "*");
        setStatus("loading", "Refreshing selection...", "Reading the current selection from the Figma document.");
      };

      document.querySelector("#convert").onclick = () => {
        const endpoint = endpointEl.value.trim();
        const apiKey = apiKeyEl.value.trim();
        const selection = currentSelection();

        if (!endpoint) {
          setStatus("error", "Missing endpoint.", "Paste a valid API endpoint before converting.");
          return;
        }

        if (!apiKey) {
          setStatus("error", "Missing API key.", "Copy an API key from the dashboard and paste it into the plugin.");
          return;
        }

        if (!selection || !Array.isArray(selection.children) || !selection.children.length) {
          setStatus(
            "error",
            "No selection available.",
            "Select a frame or layer in Figma first. If you already selected something, click Refresh selection."
          );
          return;
        }

        outputEl.value = "";
        latestTemplate = null;
        downloadEl.disabled = true;
        setLoading(true);
        setStatus(
          "loading",
          "Sending selection to the API...",
          `Endpoint: ${endpoint}\nSelected root: ${selection.name || "Untitled selection"}\nSelected nodes: ${selection.children.length}`
        );

        parent.postMessage(
          {
            pluginMessage: {
              type: "convert-selection",
              endpoint,
              apiKey
            }
          },
          "*"
        );
      };

      downloadEl.onclick = () => {
        if (!latestTemplate) {
          return;
        }

        const blob = new Blob([JSON.stringify(latestTemplate, null, 2)], {
          type: "application/json"
        });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");

        anchor.href = url;
        anchor.download = latestDownloadName;
        anchor.click();
        URL.revokeObjectURL(url);
      };

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;

        if (!message) {
          return;
        }

        if (message.type === "selection-data") {
          selectionEl.value = JSON.stringify(message.payload, null, 2);
          const selectedCount = Array.isArray(message.payload.children) ? message.payload.children.length : 0;
          setStatus(
            selectedCount ? "success" : "",
            selectedCount ? "Selection ready." : "Nothing is selected.",
            selectedCount
              ? `Selected root: ${message.payload.name || "Untitled selection"}\nSelected nodes: ${selectedCount}`
              : "Select a frame or layer in Figma, then click Convert."
          );
          return;
        }

        if (message.type === "controller-ready") {
          setStatus(
            "loading",
            "Plugin controller ready.",
            `Connected to page: ${message.payload && message.payload.pageName ? message.payload.pageName : "Unknown page"}\nWaiting for selection data...`
          );
          return;
        }

        if (message.type === "plugin-error") {
          setLoading(false);
          setStatus(
            "error",
            "Plugin initialization failed.",
            message.payload.error || "Could not initialize plugin access to the current Figma document."
          );
          return;
        }

        if (message.type === "conversion-result") {
          setLoading(false);
          if (message.payload && message.payload.template) {
            latestTemplate = message.payload.template;
            latestDownloadName = buildExportFilename(
              message.payload.template.title,
              message.payload.job && message.payload.job.id ? message.payload.job.id.replace(/^job_/, "") : ""
            );
            outputEl.value = JSON.stringify(message.payload.template, null, 2);
            downloadEl.disabled = false;
            const convertedNodes = message.payload.report ? message.payload.report.convertedNodes : 0;
            const jobId = message.payload.job ? message.payload.job.id : "saved";
            const warnings = message.payload.report && message.payload.report.warnings && message.payload.report.warnings.length
              ? `Warnings: ${message.payload.report.warnings.join(" | ")}`
              : "No mapper warnings.";
            setStatus(
              "success",
              `Conversion complete. Job ${jobId}.`,
              `Converted nodes: ${convertedNodes}\n${warnings}`
            );
          } else {
            outputEl.value = JSON.stringify(message.payload, null, 2);
            setStatus(
              "error",
              "Conversion failed.",
              message.payload && message.payload.error
                ? message.payload.error
                : "The plugin did not receive a valid Elementor template response."
            );
          }
        }
      };

      parent.postMessage(
        {
          pluginMessage: {
            type: "ui-ready"
          }
        },
        "*"
      );
    </script>
  </body>
</html>
